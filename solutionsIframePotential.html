
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Repair Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
    <style>
        /* only adds visual layout tweaks */
        .uploaded-images {
            text-align: center;
            margin-bottom: 2rem;
        }
        .uploaded-images img {
            max-width: 180px;
            max-height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        .solution-list {
            list-style: decimal inside;
            padding-left: 0;
            margin-top: 1rem;
        }
        .solution-item {
            margin-bottom: 1.5rem;
        }
        .solution-step {
            background: rgba(255,255,255,0.15);
            border-radius: 6px;
            padding: 6px 12px;
            margin: 6px 0;
        }
        body.darkmode .solution-step {
            background: rgba(0,0,0,0.25);
        }
        .solution-link a {
          text-decoration: none;
          font-weight: 600;
        }

        .solution-link a:hover {
          text-decoration: underline;
        }

        .solution-entry {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  background: rgba(255,255,255,0.6);
  border-radius: 10px;
  padding: 10px 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

body.darkmode .solution-entry {
  background: rgba(20,20,20,0.6);
}

.solution-text {
  flex: 1;
  font-size: 1rem;
  font-weight: 500;
  color: var(--bear-text, #333);
  min-width: 220px;
}

.divider {
  width: 2px;
  height: 20px;
  background: var(--bear-text, #333);
  opacity: 0.3;
}

.solution-video {
  flex-shrink: 0;
  width: 300px;
  height: 170px;
  border-radius: 10px;
  overflow: hidden;
}

.solution-video iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 10px;
}

@media (max-width: 768px) {
  .solution-entry {
    flex-direction: column;
    align-items: flex-start;
  }
  .divider {
    display: none;
  }
}

    </style>
</head>

<body class="darkmode">
    <div class="container">
        <h1 class="text-center">Repair Solutions</h1>

        <!-- solutions container -->
        <div id="solutions" class="mt-4">
          {% if solutions %}
            <ol class="solution-list">
              {% for s in solutions %}
                <li class="solution-item">
                  <div class="solution-entry">
                    <div class="solution-text">
                      <strong>{{ s.title }}</strong><br>
                      {{ s.description }}
                    </div>
                    <div class="divider"></div>
                    {% if s.url %}
                      <div class="solution-link">
                        <a href="{{ s.url }}" target="_blank" rel="noopener noreferrer" class="btn btn-outline-primary">
                          View Guide ↗
                        </a>
                      </div>
                    {% else %}
                      <div class="solution-link text-muted">(No link provided)</div>
                    {% endif %}
                  </div>
                </li>
              {% endfor %}
            </ol>
          {% else %}
            <div class="loading text-center">No solutions available.</div>
          {% endif %}
        </div>


        <!-- navigation buttons -->
        <div class="button-row">
            <a href="/" class="btn btn-danger">Back to Start</a>
        </div>

    </div>

    
<script src="../static/theme_toggle.js"></script>
</body>
</html>
